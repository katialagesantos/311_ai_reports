<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calgary 311 – Reports</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    color: #222;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ── nav bar ────────────────────────────────────────────── */
  nav {
    background: #1e2a38;
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 0 16px;
    height: 50px;
    flex-shrink: 0;
    overflow-x: auto;
    white-space: nowrap;
  }
  nav .brand {
    color: white;
    font-weight: bold;
    font-size: 14px;
    margin-right: 10px;
    flex-shrink: 0;
  }
  nav .sep { color: #3a5068; margin: 0 6px; }
  nav button {
    background: none;
    border: none;
    color: #8ab;
    cursor: pointer;
    font-size: 12.5px;
    padding: 6px 11px;
    border-radius: 4px;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s;
    font-family: inherit;
  }
  nav button:hover  { background: rgba(255,255,255,.1); color: #fff; }
  nav button.active { background: rgba(255,255,255,.15); color: #fff; font-weight: bold; }

  /* ── home panel ─────────────────────────────────────────── */
  #home-panel { flex: 1; overflow-y: auto; }

  header {
    background: #1e2a38;
    color: white;
    padding: 26px 40px 22px;
    border-top: 1px solid #2c3e50;
  }
  header h1 { font-size: 22px; margin-bottom: 5px; }
  header p  { color: #8ab; font-size: 13px; }

  main {
    max-width: 900px;
    margin: 28px auto;
    padding: 0 24px 48px;
  }
  .section-title {
    font-size: 12px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #888;
    margin: 30px 0 12px;
    border-bottom: 1px solid #dde;
    padding-bottom: 5px;
  }
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
    gap: 16px;
  }

  /* cards are <button> elements — no page navigation */
  .card {
    background: white;
    border-radius: 8px;
    padding: 18px 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    display: flex;
    flex-direction: column;
    gap: 7px;
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    color: inherit;
    border: none;
    border-left: 4px solid #2980b9;
    transition: box-shadow .15s, transform .15s;
  }
  .card:hover {
    box-shadow: 0 4px 14px rgba(0,0,0,.13);
    transform: translateY(-2px);
  }
  .card-icon  { font-size: 24px; }
  .card-title { font-size: 14px; font-weight: bold; color: #2c3e50; }
  .card-desc  { font-size: 12px; color: #777; line-height: 1.5; }
  .card-tag {
    display: inline-block;
    background: #eef3f8;
    color: #2980b9;
    font-size: 10px;
    font-weight: bold;
    padding: 2px 8px;
    border-radius: 10px;
    margin-top: 3px;
    align-self: flex-start;
  }

  footer {
    text-align: center;
    padding: 24px;
    color: #aaa;
    font-size: 12px;
  }

  /* ── iframe viewer ───────────────────────────────────────── */
  #viewer-panel {
    display: none;
    flex: 1;
    flex-direction: column;
    overflow: hidden;
  }
  #viewer-panel.visible { display: flex; }
  #report-frame { flex: 1; border: none; width: 100%; }
</style>
</head>
<body>

<!-- ── nav bar ──────────────────────────────────────────────── -->
<nav>
  <span class="brand">&#128202; Calgary 311</span>
  <span class="sep">|</span>
  <button class="active" onclick="showHome()">&#8962; Home</button>
  <button onclick="openReport('community_map.html', this)">&#128506; Community Map</button>
  <button onclick="openReport('weather_311_analysis.html', this)">&#127774; Weather Analysis</button>
  <button onclick="openReport('summary_dashboard.html', this)">&#128200; Summary Dashboard</button>
  <button onclick="openReport('report.html', this)">&#128203; Dataset Profile</button>
  <button onclick="openReport('outlier_report.html', this)">&#128269; Outlier Report</button>
  <button onclick="openReport('data_notes.html', this)">&#128221; Data Notes</button>
</nav>

<!-- ── home panel ───────────────────────────────────────────── -->
<div id="home-panel">
  <header>
    <h1>Reports Dashboard</h1>
    <p>Analysis reports generated from City of Calgary 311 Open Data (2010 – 2026)</p>
  </header>

  <main>

    <div class="section-title">Maps</div>
    <div class="card-grid">
      <button class="card" style="border-left-color:#27ae60"
              onclick="openReport('community_map.html', null)">
        <div class="card-icon">&#128506;</div>
        <div class="card-title">Community Map</div>
        <div class="card-desc">
          Interactive Leaflet map of 311 requests by location.
          Filter by year range and toggle between heatmap and cluster view.
        </div>
        <span class="card-tag" style="background:#eafaf1;color:#27ae60">Interactive · Leaflet.js</span>
      </button>
    </div>

    <div class="section-title">Analysis Reports</div>
    <div class="card-grid">
      <button class="card" style="border-left-color:#8e44ad"
              onclick="openReport('weather_311_analysis.html', null)">
        <div class="card-icon">&#127774;</div>
        <div class="card-title">Weather × 311 Analysis</div>
        <div class="card-desc">
          Hidden relationships between Calgary weather conditions,
          service request types, and communities. Includes correlation heatmaps,
          seasonal patterns, and spike analysis during extreme events.
        </div>
        <span class="card-tag" style="background:#f5eef8;color:#8e44ad">7.2M requests · 5,863 weather days</span>
      </button>

      <button class="card" onclick="openReport('summary_dashboard.html', null)">
        <div class="card-icon">&#128200;</div>
        <div class="card-title">Summary Dashboard</div>
        <div class="card-desc">
          Top service types, agencies, communities, sources, and
          resolution time statistics from the 311 dataset.
        </div>
        <span class="card-tag">Charts · HTML</span>
      </button>
    </div>

    <div class="section-title">Profiling &amp; Quality</div>
    <div class="card-grid">
      <button class="card" style="border-left-color:#e67e22"
              onclick="openReport('report.html', null)">
        <div class="card-icon">&#128203;</div>
        <div class="card-title">Dataset Profile</div>
        <div class="card-desc">
          Full ydata-profiling report — column types, missing values,
          distributions, correlations, and sample data.
        </div>
        <span class="card-tag" style="background:#fef5ec;color:#e67e22">ydata-profiling</span>
      </button>

      <button class="card" style="border-left-color:#e74c3c"
              onclick="openReport('outlier_report.html', null)">
        <div class="card-icon">&#128269;</div>
        <div class="card-title">Outlier &amp; Anomaly Report</div>
        <div class="card-desc">
          Automated quality checks: resolution time outliers, monthly volume
          spikes, date anomalies, coordinate errors, duplicates, and
          service concentration anomalies.
        </div>
        <span class="card-tag" style="color:#e74c3c;background:#fdecea">6 checks</span>
      </button>

      <button class="card" style="border-left-color:#16a085"
              onclick="openReport('data_notes.html', null)">
        <div class="card-icon">&#128221;</div>
        <div class="card-title">Data Notes</div>
        <div class="card-desc">
          Per-step breakdown of how many rows each pipeline report includes,
          excludes, and why &mdash; missing dates, missing coordinates,
          sampling caps, and join coverage.
        </div>
        <span class="card-tag" style="color:#16a085;background:#e8f8f5">6 pipeline steps</span>
      </button>
    </div>

  </main>

  <footer>
    Data: City of Calgary 311 Open Data &nbsp;|&nbsp;
    Weather: Open-Meteo Historical Archive &nbsp;|&nbsp;
    Updated 2026-03-30
  </footer>
</div>

<!-- ── iframe viewer ─────────────────────────────────────────── -->
<div id="viewer-panel">
  <iframe id="report-frame" title="Report viewer"></iframe>
</div>

<script>
  const homePanel = document.getElementById('home-panel');
  const viewerPanel = document.getElementById('viewer-panel');
  const frame = document.getElementById('report-frame');
  const navBtns = Array.from(document.querySelectorAll('nav button'));

  function clearActive() {
    navBtns.forEach(b => b.classList.remove('active'));
  }

  function openReport(url, btn) {
    clearActive();
    const target = btn || navBtns.find(
      b => (b.getAttribute('onclick') || '').includes("'" + url + "'")
    );
    if (target) target.classList.add('active');

    frame.src = url;
    homePanel.style.display = 'none';
    viewerPanel.classList.add('visible');
  }

  function showHome() {
    clearActive();
    navBtns[0].classList.add('active');
    homePanel.style.display = '';
    viewerPanel.classList.remove('visible');
    frame.src = '';
  }
</script>

</body>
</html>
